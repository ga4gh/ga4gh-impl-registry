spring:
  application:
    name: ga4gh-registry
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ga4gh_registry}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

registry:
  service-info:
    id: org.ga4gh.registry
    name: GA4GH Registry
    description: Registry of GA4GH Cloud API implementations
    organisation-name: GA4GH
    organisation-url: https://www.ga4gh.org
    contact-url: https://github.com/ga4gh/ga4gh-registry
    documentation-url: https://github.com/ga4gh/ga4gh-registry
    version: 0.1.0
    environment: ${ENVIRONMENT:development}
