name: Build and Push to ECR

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'Dockerfile'
      - '.github/workflows/**'

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: ga4gh-impl-registry

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/main/frontend/package-lock.json

      - name: Build with Gradle
        run: ./gradlew build -x test --no-daemon

      - name: Run tests
        if: false
        run: ./gradlew test --no-daemon

      - name: Generate test coverage
        if: false
        run: ./gradlew jacocoTestReport --no-daemon

      - name: Setting Up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Create ECR repository if it does not exist
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE

      - name: Get next version from ECR
        run: |
          TAGS=$(aws ecr list-images \
            --repository-name $ECR_REPOSITORY \
            --query 'imageIds[*].imageTag' \
            --output text 2>/dev/null | tr '\t' '\n' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -1)

          echo "Latest version found: $TAGS"

          if [ -z "$TAGS" ]; then
            NEXT_VERSION="0.1.0"
          else
            MAJOR=$(echo $TAGS | cut -d. -f1)
            MINOR=$(echo $TAGS | cut -d. -f2)
            PATCH=$(echo $TAGS | cut -d. -f3)
            NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi

          echo "Next version: $NEXT_VERSION"
          # Write to a file so the next step can reliably read it
          echo "$NEXT_VERSION" > /tmp/version.txt
          echo "NEXT_VERSION=${NEXT_VERSION}" >> $GITHUB_ENV

      - name: Build and Push to ECR
        run: |
          NEXT_VERSION=$(cat /tmp/version.txt)
          REGISTRY=${{ steps.login-ecr.outputs.registry }}

          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag ${REGISTRY}/${{ env.ECR_REPOSITORY }}:${NEXT_VERSION} \
            --tag ${REGISTRY}/${{ env.ECR_REPOSITORY }}:latest \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -f ./Dockerfile .

          echo "✅ Pushed image:"
          echo "   ${REGISTRY}/${{ env.ECR_REPOSITORY }}:${NEXT_VERSION}"
          echo "   ${REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"

      - name: Post build summary
        run: |
          NEXT_VERSION=$(cat /tmp/version.txt)
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_URI="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${NEXT_VERSION}"

          echo "## Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${NEXT_VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image URI | \`${IMAGE_URI}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To deploy, go to **Actions → Deploy to CloudFormation** and run manually with this image URI." >> $GITHUB_STEP_SUMMARY
