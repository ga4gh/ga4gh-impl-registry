AWSTemplateFormatVersion: '2010-09-09'
Description: GA4GH Implementation Registry - Single EC2 + RDS (lightweight)

Parameters:
  Environment:
    Type: String
    Default: production

  ImageUri:
    Type: String
    Description: ECR image URI to deploy

  InstanceType:
    Type: String
    Default: t3.small

  DatabaseName:
    Type: String
    Default: ga4gh_registry

  DatabaseUsername:
    Type: String
    Default: ga4gh_admin

  DatabasePassword:
    Type: String
    NoEcho: true

  DatabaseInstanceClass:
    Type: String
    Default: db.t3.micro

  SSHKeyName:
    Type: String
    Default: ''
    Description: Optional EC2 key pair name for SSH access

Conditions:
  HasSSHKey: !Not [!Equals [!Ref SSHKeyName, '']]

Resources:

  # ── VPC & NETWORKING ────────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ga4gh-impl-registry-${Environment}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ga4gh-impl-registry-${Environment}-igw

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ga4gh-impl-registry-${Environment}-public

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ga4gh-impl-registry-${Environment}-private-1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ga4gh-impl-registry-${Environment}-private-2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ── SECURITY GROUPS ─────────────────────────────────────────────────────────

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and optional SSH to EC2
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ga4gh-impl-registry-${Environment}-ec2-sg

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow Postgres from EC2 only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ga4gh-impl-registry-${Environment}-rds-sg

  # ── RDS ─────────────────────────────────────────────────────────────────────

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for GA4GH Registry RDS
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub ga4gh-impl-registry-${Environment}-db
      DBName: !Ref DatabaseName
      DBInstanceClass: !Ref DatabaseInstanceClass
      Engine: postgres
      EngineVersion: '15.15'
      MasterUsername: !Ref DatabaseUsername
      MasterUserPassword: !Ref DatabasePassword
      AllocatedStorage: '20'
      StorageType: gp2
      MultiAZ: false
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      BackupRetentionPeriod: 7
      DeletionProtection: false
      PubliclyAccessible: false

  # ── EC2 INSTANCE ROLE ────────────────────────────────────────────────────────

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub ga4gh-impl-registry-${Environment}-ec2-role

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # ── EC2 INSTANCE ─────────────────────────────────────────────────────────────

  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn: RDSInstance
    Properties:
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      KeyName: !If [HasSSHKey, !Ref SSHKeyName, !Ref AWS::NoValue]
      Tags:
        - Key: Name
          Value: !Sub ga4gh-impl-registry-${Environment}
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e

          # Install Docker
          yum update -y
          yum install -y docker
          systemctl start docker
          systemctl enable docker

          # Install AWS CLI v2
          yum install -y aws-cli

          # Log in to ECR
          aws ecr get-login-password --region ${AWS::Region} | \
            docker login --username AWS --password-stdin \
            $(echo ${ImageUri} | cut -d/ -f1)

          # Pull and run the application
          docker pull ${ImageUri}

          docker run -d \
            --name ga4gh-registry \
            --restart unless-stopped \
            -p 8080:8080 \
            -e DB_URL=jdbc:postgresql://${RDSInstance.Endpoint.Address}:5432/${DatabaseName} \
            -e DB_USERNAME=${DatabaseUsername} \
            -e DB_PASSWORD=${DatabasePassword} \
            -e ENVIRONMENT=${Environment} \
            -e SERVER_PORT=8080 \
            ${ImageUri}

          echo "✅ GA4GH Registry started"

  # ── CLOUDWATCH LOG GROUP ─────────────────────────────────────────────────────

  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ga4gh-impl-registry/${Environment}
      RetentionInDays: 30

Outputs:

  ApplicationURL:
    Description: Application URL
    Value: !Sub http://${EC2Instance.PublicDnsName}:8080
    Export:
      Name: !Sub ga4gh-impl-registry-${Environment}-url

  ServiceInfoURL:
    Description: Service info endpoint
    Value: !Sub http://${EC2Instance.PublicDnsName}:8080/api/service-info
    Export:
      Name: !Sub ga4gh-impl-registry-${Environment}-service-info

  UIURL:
    Description: UI URL
    Value: !Sub http://${EC2Instance.PublicDnsName}:8080/index.html
    Export:
      Name: !Sub ga4gh-impl-registry-${Environment}-ui

  RDSEndpoint:
    Description: RDS endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub ga4gh-impl-registry-${Environment}-rds
